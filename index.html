<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>URL Shortener</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f4f6f8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 40px;
      width: 100%;
      max-width: 520px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }

    h1 {
      font-size: 1.6rem;
      color: #1a1a2e;
      margin-bottom: 6px;
    }

    p.subtitle {
      color: #888;
      font-size: 0.9rem;
      margin-bottom: 28px;
    }

    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: #444;
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: 0.95rem;
      margin-bottom: 16px;
      outline: none;
      transition: border 0.2s;
    }

    input:focus { border-color: #4f46e5; }

    button {
      width: 100%;
      padding: 13px;
      background: #4f46e5;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover { background: #4338ca; }
    button:disabled { background: #a5b4fc; cursor: not-allowed; }

    /* Result box */
    .result {
      margin-top: 24px;
      padding: 16px;
      background: #f0fdf4;
      border: 1.5px solid #86efac;
      border-radius: 8px;
      display: none;       /* hidden until a result comes back */
    }

    .result p { font-size: 0.85rem; color: #555; margin-bottom: 6px; }

    .result-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .result a {
      font-size: 1rem;
      font-weight: 600;
      color: #4f46e5;
      word-break: break-all;
      text-decoration: none;
    }

    .result a:hover { text-decoration: underline; }

    .copy-btn {
      width: auto;
      padding: 6px 14px;
      font-size: 0.8rem;
      background: #4f46e5;
      border-radius: 6px;
      white-space: nowrap;
    }

    /* Error box */
    .error {
      margin-top: 24px;
      padding: 14px;
      background: #fff1f1;
      border: 1.5px solid #fca5a5;
      border-radius: 8px;
      color: #b91c1c;
      font-size: 0.9rem;
      display: none;
    }
  </style>
</head>
<body>

<div class="card">
  <h1>URL Shortener</h1>
  <p class="subtitle">Paste a long URL and get a short one instantly.</p>

  <!-- Input form -->
  <label for="longUrl">Long URL</label>
  <input
    type="url"
    id="longUrl"
    placeholder="https://example.com/very/long/url"
  />

  <label for="alias">Custom alias <span style="font-weight:400;color:#aaa">(optional)</span></label>
  <input
    type="text"
    id="alias"
    placeholder="e.g. my-link  →  localhost:8000/my-link"
  />

  <button id="shortenBtn" onclick="shorten()">Shorten URL</button>

  <!-- Success result -->
  <div class="result" id="result">
    <p>Your short URL is ready:</p>
    <div class="result-row">
      <a id="shortLink" href="#" target="_blank"></a>
      <button class="copy-btn" onclick="copyLink()">Copy</button>
    </div>
  </div>

  <!-- Error message -->
  <div class="error" id="error"></div>
</div>

<script>
  const API = "http://localhost:8000";  // your FastAPI backend

  async function shorten() {
    const url      = document.getElementById("longUrl").value.trim();
    const alias    = document.getElementById("alias").value.trim();
    const btn      = document.getElementById("shortenBtn");
    const resultEl = document.getElementById("result");
    const errorEl  = document.getElementById("error");

    // Reset previous results
    resultEl.style.display = "none";
    errorEl.style.display  = "none";

    // Basic client-side check
    if (!url) {
      showError("Please enter a URL.");
      return;
    }

    // Build the request body
    // This is the JSON that goes to POST /shorten
    const body = { url };
    if (alias) body.custom_alias = alias;  // only add if user typed something

    btn.disabled    = true;
    btn.textContent = "Shortening...";

    try {
      // This is the fetch() call that connects frontend → backend
      const response = await fetch(`${API}/shorten`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body)
      });

      const data = await response.json();

      if (!response.ok) {
        // FastAPI sends { "detail": "..." } for errors
        showError(data.detail || "Something went wrong.");
        return;
      }

      // Show the result
      const link = document.getElementById("shortLink");
      link.href        = data.short_url;
      link.textContent = data.short_url;
      resultEl.style.display = "block";

    } catch (err) {
      // This fires if the backend is not running at all
      showError("Cannot reach the server. Is your FastAPI app running?");
    } finally {
      btn.disabled    = false;
      btn.textContent = "Shorten URL";
    }
  }

  function showError(msg) {
    const errorEl = document.getElementById("error");
    errorEl.textContent    = msg;
    errorEl.style.display  = "block";
  }

  function copyLink() {
    const link = document.getElementById("shortLink").textContent;
    navigator.clipboard.writeText(link);
    alert("Copied to clipboard!");
  }

  // Allow pressing Enter to submit
  document.getElementById("longUrl").addEventListener("keydown", e => {
    if (e.key === "Enter") shorten();
  });
</script>

</body>
</html>
